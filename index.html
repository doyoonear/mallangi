<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mallang</title>
  <meta name="description" content="Mallangi app support and privacy pages.">
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #03050d; color: #f8fbff; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 20% 10%, rgba(122,227,232,.18), transparent 34%), linear-gradient(145deg, #000, #050813 55%, #0b1023); }
    main { width: min(680px, calc(100% - 40px)); padding: 44px 0; }
    .card { border: 1px solid rgba(255,255,255,.14); border-radius: 28px; padding: 32px; background: rgba(255,255,255,.07); box-shadow: 0 24px 80px rgba(0,0,0,.34); backdrop-filter: blur(18px); }
    h1 { margin: 0 0 10px; font-size: clamp(36px, 8vw, 64px); letter-spacing: -.04em; }
    p { margin: 0 0 24px; color: rgba(248,251,255,.76); line-height: 1.6; font-size: 17px; }
    nav { display: flex; gap: 12px; flex-wrap: wrap; }
    a { color: #001015; background: #8cf4ef; text-decoration: none; font-weight: 700; padding: 12px 16px; border-radius: 999px; }
    a.secondary { color: #f8fbff; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.14); }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Mallangi</h1>
      <p>A soft digital sensory toy for short breaks. Find privacy and support information below.</p>
      <nav>
        <a href="./privacy/">Privacy Policy</a>
        <a class="secondary" href="./support/">Support</a>
      </nav>
    </section>
  </main>
</body>
</html>
